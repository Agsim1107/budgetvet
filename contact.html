<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>The Hideaway - Contact</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles/styles.css" rel="stylesheet">
</head>
<body>
<div id="wrapper">

    <header>
        <h1>The Hideaway</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="rooms/master-bedroom.html">Master Bedroom</a></li>
            <li><a href="rooms/second-bedroom.html">Second Bedroom</a></li>
            <li><a href="events/activities.html">Activities</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h3>Contact Us</h3>

        <form>
            <!-- Text Box -->
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" placeholder="Your name"><br><br>

            <!-- Email Text Box -->
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Your email"><br><br>

            <!-- Radio Buttons -->
            <label>Preferred Contact Method:</label><br>
            <input type="radio" id="contactEmail" name="contactMethod" value="email">
            <label for="contactEmail">Email</label><br>
            <input type="radio" id="contactPhone" name="contactMethod" value="phone">
            <label for="contactPhone">Phone</label><br><br>

            <!-- Checkboxes -->
            <label>Services Interested In:</label><br>
            <input type="checkbox" id="bedroom" name="services" value="bedroom">
            <label for="bedroom">Room Booking</label><br>
            <input type="checkbox" id="events" name="services" value="events">
            <label for="events">Events</label><br><br>

            <!-- Textarea -->
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" cols="40" placeholder="Your message here..."></textarea>
        </form>
    </main>

    <footer>
        Copyright &copy; 2025<br>
        <a href="mailto:a0586681@amarillocollege.com">Alex Sim</a>
    </footer>

</div>
</body>
